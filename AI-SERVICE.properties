#spring.application.name=ai-service
spring.application.name=AI-SERVICE

server.port=8083

# ===============================
# Eureka server
# ===============================
#Configuration is required to locate the Eureka server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=localhost
eureka.instance.instance-id=${spring.application.name}:${server.port}


# ===============================
# MongoDB
# ===============================
#spring.data.mongodb.uri=mongodb://localhost:27017

spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=fitnessrecommendation

logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG

# ===============================
# RabbitMQ (Consumer)
# ===============================

#spring.rabbitmq.host=localhost
#spring.rabbitmq.port=5672
#spring.rabbitmq.username=admin
#spring.rabbitmq.password=admin123

spring.rabbitmq.addresses=${RABBITMQ_URL}

rabbitmq.exchange.name=fitness.exchange
rabbitmq.queue.name=activity.queue
rabbitmq.routing.key=activity.tracking

spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=4


gemini.api.url=${GEMINI_API_URL}
gemini.api.key=${GEMINI_API_KEY}

# ===============================
# Actuator
# ===============================

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
